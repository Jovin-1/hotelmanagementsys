<!DOCTYPE html>
<html>
<head>
  <title>Update Booking</title>
  <link rel="stylesheet" href="/static/style.css"> <!-- your big CSS -->
</head>

<body>

<header>
  <h1>Hotel Paradise</h1>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/room">Rooms</a>
  <a href="/service">Services</a>
  <a href="/update-booking">Booking</a>
  <a href="/cancel-booking">Cancel</a>
</nav>

<div class="ub-cancel-section"> <!-- reuse layout classes -->
  <div class="ub-cancel-box">

    <h2>Update Booking</h2>

    <form id="ub-bookingForm">
      <input type="text" id="ub-bookingId" name="bookingId" placeholder="Enter Booking ID" required>
      <input type="text" id="ub-gname" name="gname" placeholder="Guest Name" readonly>

      <select id="ub-roomType" name="room_type">
        <option value="Deluxe">Deluxe</option>
        <option value="Standard">Standard</option>
        <option value="Suite">Suite</option>
      </select>

      <input type="date" id="ub-check_in" name="check_in" required>
      <input type="date" id="ub-check_out" name="check_out" required>

      <select id="ub-payment_mode" name="payment_mode">
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="UPI">UPI</option>
      </select>

      <button type="submit">Update Booking</button>
    </form>

    <div id="ub-billDetails">
      <p id="ub-billstats"></p>
      <pre id="ub-billText"></pre>
      <p id="ub-mess"></p>
    </div>

  </div>
</div>

<script src="/static/js/ub-updateBooking.js"></script>

</body>
</html>
