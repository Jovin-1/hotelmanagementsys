<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Booking</title>
  <link rel="stylesheet" href="/static/style.css">

</head>
<body>

<header>
  <h1>Hotel Paradise</h1>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/room">Rooms</a>
  <a href="/service">Services</a>
<a href="/update-booking">Update Booking</a>
<a href="/cancel-booking">Cancel Booking</a>
</nav>

<div class="ub-cancel-section">
  <div class="ub-cancel-box">

    <h2>Update Booking</h2>

    <!-- Step 1: Get booking -->
    <form id="ub-fetchBookingForm">
      <input type="text" id="ub-bookingIdFetch" placeholder="Enter Booking ID" required>
      <input type="text" id="ub-guestNameFetch" placeholder="Guest Name" required>
      <input type="date" id="ub-dobFetch" placeholder="DOB" required>
      <button type="submit">Fetch Booking</button>
    </form>

    <hr>

    <!-- Message if reservation not found -->
    <p id="ub-notfound" style="display:none; color:red; font-weight:bold;">Reservation not found</p>

    <!-- Step 2: Update booking (only editable fields) -->
    <form id="ub-bookingForm" style="display:none;">
      <label>Room Type:</label>
      <select id="ub-roomType" name="room_type">
        <option value="Single Room">Single Room</option>
        <option value="Double Room">Double Room</option>
        <option value="Deluxe Room">Deluxe Room</option>
        <option value="Family Room">Family Room</option>
        <option value="Executive Suite">Executive Suite</option>
        <option value="Presidential Suite">Presidential Suite</option>
      </select>

      <label>Check-In:</label>
      <input type="date" id="ub-check_in" name="check_in" required>
      <label>Check-Out:</label>
      <input type="date" id="ub-check_out" name="check_out" required>

      <label>Payment Mode:</label>
      <select id="ub-payment_mode" name="payment_mode">
        <option value="Cash">Cash</option>
        <option value="UPI">UPI</option>
    <option value="Card">Card</option>
      </select>

      <button type="submit">Update Booking</button>
    </form>

  </div>
</div>

<!-- Bill Popup -->
<div class="popup-overlay" id="billPopup">
  <div class="popup">
    <span class="close-btn" onclick="closeBillPopup()">✖</span>
    <h2>Bill Details</h2>
    <div id="billContent">
      <div class="bill-item"><span>Bill ID:</span> <span id="billId"></span></div>
<div class="bill-item"><span>Guest ID:</span> <span id="guestId"></span></div>
<div class="bill-item"><span>Guest Name:</span> <span id="guestName"></span></div>
<div class="bill-item"><span>Reservation ID:</span> <span id="billResId"></span></div>
<div class="bill-item"><span>Room No:</span> <span id="billRoomNo"></span></div>
<div class="bill-item"><span>Floor No:</span> <span id="billFloorNo"></span></div>
<div class="bill-item"><span>Room Type:</span> <span id="billRoomType"></span></div>
<div class="bill-item"><span>Check-In:</span> <span id="billCheckIn"></span></div>
<div class="bill-item"><span>Check-Out:</span> <span id="billCheckOut"></span></div>
<div class="bill-item"><span>Payment Mode:</span> <span id="billPayment"></span></div>
<div class="bill-item"><span>Total Bill:</span> ₹<span id="billTotal"></span></div>
<div class="refund" id="billRefund"></div>
    </div>
  </div>
</div>

<script src="/static/updatebooking.js">
</script>

</body>
</html>
